server:
  # Порт встроенного Tomcat (Jetty/Undertow). По умолчанию у Spring Boot — 8080.
  port: 8080

spring:
  application:
    name: javapro

  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Схема уже могла быть создана вручную/JDBC без flyway_schema_history
    baseline-on-migrate: true
